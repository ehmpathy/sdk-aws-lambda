ignorePatterns:
  - ".build"
ignores:
  - depcheck
  - declapract
  - declapract-typescript-ehmpathy
  - '@commitlint/config-conventional'
  - test-fns
  - '@ehmpathy/error-fns'
  - husky
  - if-env
  - rhachet
  - rhachet-brains-anthropic
  - rhachet-brains-fireworksai
  - rhachet-brains-xai
  - "@tsconfig/node20"
  - "@tsconfig/strictest"
  - "@biomejs/biome"
  - esbuild-register
  - "@swc/core"
  - "@swc/jest"
  - tsx
  - "@src/*"
  - "@src/.*"
  - rhachet-roles-bhrain
  - rhachet-roles-bhuild
  - rhachet-roles-ehmpathy
  - rhachet-roles-rhachet
  - tsc-alias
  - yalc
  - simple-in-memory-cache # type-only import in askLambdaEndpoint context, depcheck can't detect
  - "@middy/http-json-body-parser" # body parse done in genApiGatewayEventNormalizationMiddleware; dep kept for future alignment
